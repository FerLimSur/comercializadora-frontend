<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - Comercializadora XYZ</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  .gradient-bg {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
</style>
</head>
<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl">
    <div class="text-center">
      <i class="fas fa-user-plus text-5xl text-purple-600 mb-4"></i>
      <h2 class="text-3xl font-bold text-gray-900">Crear Cuenta</h2>
      <p class="mt-2 text-gray-600">Regístrate para comenzar a comprar</p>
    </div>
    
    <form class="mt-8 space-y-6" onsubmit="handleRegister(event)">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nombre Completo</label>
          <div class="relative">
            <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
            <input type="text" id="fullname" required class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Juan Pérez">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-3 top-3 text-gray-400"></i>
            <input type="email" id="email" required class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="juan@ejemplo.com">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Teléfono</label>
          <div class="relative">
            <i class="fas fa-phone absolute left-3 top-3 text-gray-400"></i>
            <input type="tel" id="phone" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="12345678">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
            <input type="password" id="password" required class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="••••••••">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Confirmar Contraseña</label>
          <div class="relative">
            <i class="fas fa-check absolute left-3 top-3 text-gray-400"></i>
            <input type="password" id="confirm_password" required class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="••••••••">
          </div>
        </div>
      </div>

      <div>
        <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white gradient-bg hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition">
          <i class="fas fa-user-plus mr-2"></i> Registrarse
        </button>
      </div>

      <div class="text-center">
        <p class="text-sm text-gray-600">
          ¿Ya tienes una cuenta?
          <a href="login.html" class="font-medium text-purple-600 hover:text-purple-500">Inicia sesión aquí</a>
        </p>
      </div>
    </form>
  </div>
</div>

<script>
  // Obtener clientes registrados de localStorage
  let clientes = JSON.parse(localStorage.getItem('clientes')) || [];

  function handleRegister(event) {
    event.preventDefault();
    
    const fullname = document.getElementById('fullname').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;

    if (password !== confirmPassword) {
      alert('Las contraseñas no coinciden');
      return;
    }

    // Verificar si el email ya está registrado
    if (clientes.find(c => c.email === email)) {
      alert('Este correo ya está registrado');
      return;
    }

    // Crear nuevo cliente
    const newClient = {
      id: clientes.length + 1,
      nombre: fullname,
      email: email,
      telefono: phone,
      password: password,
      fechaRegistro: new Date().toISOString(),
      role: 'cliente'
    };

    clientes.push(newClient);
    localStorage.setItem('clientes', JSON.stringify(clientes));
    
    alert('Registro exitoso! Ahora puedes iniciar sesión.');
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
