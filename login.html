<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión - Comercializadora XYZ</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  .gradient-bg {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
</style>
</head>
<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl">
    <div class="text-center">
      <i class="fas fa-store text-5xl text-purple-600 mb-4"></i>
      <h2 class="text-3xl font-bold text-gray-900">Bienvenido</h2>
      <p class="mt-2 text-gray-600">Inicia sesión en tu cuenta</p>
    </div>
    
    <form class="mt-8 space-y-6" onsubmit="handleLogin(event)">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Usuario o Email</label>
          <div class="relative">
            <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
            <input type="text" id="username" required class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="usuario@ejemplo.com">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
            <input type="password" id="password" required class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="••••••••">
          </div>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input type="checkbox" class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded">
            <label class="ml-2 block text-sm text-gray-900">Recordarme</label>
          </div>
          <a href="#" class="text-sm text-purple-600 hover:text-purple-500">¿Olvidaste tu contraseña?</a>
        </div>
      </div>

      <div>
        <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white gradient-bg hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition">
          <i class="fas fa-sign-in-alt mr-2"></i> Iniciar Sesión
        </button>
      </div>

      <div class="text-center">
        <p class="text-sm text-gray-600">
          ¿No tienes una cuenta?
          <a href="register.html" class="font-medium text-purple-600 hover:text-purple-500">Regístrate aquí</a>
        </p>
      </div>
    </form>

    <!-- Demo Accounts -->
    <div class="mt-6 p-4 bg-gray-50 rounded-lg">
      <p class="text-xs text-gray-500 text-center mb-2">Cuentas de demostración:</p>
      <div class="grid grid-cols-5 gap-2 text-xs">
        <div class="text-center"><p class="font-semibold">Admin</p><p class="text-gray-500">admin</p><p class="text-gray-500">admin123</p></div>
        <div class="text-center"><p class="font-semibold">Vendedor</p><p class="text-gray-500">vendedor</p><p class="text-gray-500">vendedor123</p></div>
        <div class="text-center"><p class="font-semibold">Cliente</p><p class="text-gray-500">cliente</p><p class="text-gray-500">cliente123</p></div>
        <div class="text-center"><p class="font-semibold">Almacén</p><p class="text-gray-500">almacen</p><p class="text-gray-500">almacen123</p></div>
        <div class="text-center"><p class="font-semibold">Gerente</p><p class="text-gray-500">gerente</p><p class="text-gray-500">gerente123</p></div>
      </div>
    </div>
  </div>
</div>

<script>
  const users = {
    admin: { password: 'admin123', role: 'admin', name: 'Administrador' },
    vendedor: { password: 'vendedor123', role: 'vendedor', name: 'Vendedor' },
    cliente: { password: 'cliente123', role: 'cliente', name: 'Cliente' },
    almacen: { password: 'almacen123', role: 'almacen', name: 'Encargado Almacén' },
    gerente: { password: 'gerente123', role: 'gerente', name: 'Gerente General' }
  };

  function handleLogin(event) {
    event.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    if (users[username] && users[username].password === password) {
      localStorage.setItem('currentUser', JSON.stringify({
        username: username,
        role: users[username].role,
        name: users[username].name
      }));
      
      switch(users[username].role) {
        case 'admin':
          window.location.href = 'dashboard-admin.html';
          break;
        case 'vendedor':
          window.location.href = 'dashboard-vendedor.html';
          break;
        case 'cliente':
          window.location.href = 'dashboard-cliente.html';
          break;
        case 'almacen':
          window.location.href = 'dashboard-almacen.html';
          break;
        case 'gerente':
          window.location.href = 'dashboard-gerente.html';
          break;
        default:
          window.location.href = 'index.html';
      }
    } else {
      alert('Usuario o contraseña incorrectos');
    }
  }
</script>
</body>
</html>
