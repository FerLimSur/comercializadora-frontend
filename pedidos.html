<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Pedidos - Comercializadora XYZ</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

<div class="container mx-auto px-6 py-8">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Gestión de Pedidos</h1>
    <a href="dashboard-vendedor.html" class="bg-gray-600 text-white px-4 py-2 rounded-lg">← Volver</a>
  </div>

  <!-- Nuevo Pedido -->
  <div class="bg-white rounded-xl shadow-md p-6 mb-8">
    <h2 class="text-xl font-bold mb-4">Nuevo Pedido</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium mb-2">Cliente</label>
        <select id="cliente-pedido" class="w-full border rounded-lg p-2 mb-4">
          <option value="">Seleccione un cliente</option>
        </select>
        <button onclick="abrirModalCliente()" class="text-blue-600 text-sm mb-4">+ Registrar nuevo cliente</button>
        
        <label class="block text-sm font-medium mb-2">Agregar Producto</label>
        <div class="flex space-x-2 mb-4">
          <select id="producto-pedido" class="flex-1 border rounded-lg p-2">
            <option value="">Seleccione producto</option>
          </select>
          <input type="number" id="cantidad-pedido" placeholder="Cant." class="w-24 border rounded-lg p-2">
          <button onclick="agregarProductoPedido()" class="bg-green-600 text-white px-4 py-2 rounded-lg">+</button>
        </div>
      </div>
      
      <div class="bg-gray-50 rounded-lg p-4">
        <h3 class="font-bold mb-3">Productos del Pedido</h3>
        <div id="lista-productos-pedido" class="max-h-64 overflow-y-auto"></div>
        <div class="border-t mt-4 pt-4">
          <div class="flex justify-between mb-2"><span>Subtotal:</span><span id="subtotal-pedido">Bs. 0</span></div>
          <div class="flex justify-between mb-2"><span>IVA (13%):</span><span id="iva-pedido">Bs. 0</span></div>
          <div class="flex justify-between font-bold text-lg"><span>Total:</span><span id="total-pedido">Bs. 0</span></div>
        </div>
        <button onclick="crearPedido()" class="w-full bg-blue-600 text-white py-2 rounded-lg mt-4">Crear Pedido</button>
      </div>
    </div>
  </div>

  <!-- Lista de Pedidos -->
  <div class="bg-white rounded-xl shadow-md p-6">
    <h2 class="text-xl font-bold mb-4">Pedidos Registrados</h2>
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-gray-50"><tr><th class="px-4 py-2">ID</th><th class="px-4 py-2">Cliente</th><th class="px-4 py-2">Total</th><th class="px-4 py-2">Estado</th><th class="px-4 py-2">Fecha</th><th class="px-4 py-2">Acciones</th></tr></thead>
        <tbody id="tabla-pedidos"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
  let productos = JSON.parse(localStorage.getItem('productos')) || [];
  let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
  let currentPedidoProductos = [];

  function cargarSelects() {
    const clienteSelect = document.getElementById('cliente-pedido');
    clienteSelect.innerHTML = '<option value="">Seleccione un cliente</option>' + clientes.map(c => `<option value="${c.id}">${c.nombre} - ${c.email}</option>`).join('');
    
    const productoSelect = document.getElementById('producto-pedido');
    productoSelect.innerHTML = '<option value="">Seleccione producto</option>' + productos.filter(p => p.stock > 0).map(p => `<option value="${p.id}" data-precio="${p.precio}" data-stock="${p.stock}">${p.nombre} - Bs. ${p.precio} (Stock: ${p.stock})</option>`).join('');
  }

  function agregarProductoPedido() {
    const productoId = document.getElementById('producto-pedido').value;
    const cantidad = parseInt(document.getElementById('cantidad-pedido').value);
    if (!productoId || !cantidad) { alert('Seleccione producto y cantidad'); return; }
    const producto = productos.find(p => p.id == productoId);
    if (cantidad > producto.stock) { alert(`Stock insuficiente. Disponible: ${producto.stock}`); return; }
    
    const existente = currentPedidoProductos.find(p => p.id == productoId);
    if (existente) { existente.cantidad += cantidad; } 
    else { currentPedidoProductos.push({ id: producto.id, nombre: producto.nombre, precio: producto.precio, cantidad: cantidad }); }
    
    actualizarListaPedido();
    document.getElementById('cantidad-pedido').value = '';
  }

  function actualizarListaPedido() {
    const container = document.getElementById('lista-productos-pedido');
    container.innerHTML = currentPedidoProductos.map(p => `<div class="flex justify-between items-center border-b py-2"><div><span class="font-semibold">${p.nombre}</span><br><span class="text-sm">${p.cantidad} x Bs. ${p.precio}</span></div><div><span class="font-bold">Bs. ${(p.cantidad * p.precio).toFixed(2)}</span><button onclick="eliminarProductoPedido(${p.id})" class="ml-3 text-red-600"><i class="fas fa-trash"></i></button></div></div>`).join('');
    
    const subtotal = currentPedidoProductos.reduce((sum, p) => sum + (p.cantidad * p.precio), 0);
    const iva = subtotal * 0.13;
    const total = subtotal + iva;
    document.getElementById('subtotal-pedido').innerText = `Bs. ${subtotal.toFixed(2)}`;
    document.getElementById('iva-pedido').innerText = `Bs. ${iva.toFixed(2)}`;
    document.getElementById('total-pedido').innerText = `Bs. ${total.toFixed(2)}`;
  }

  function eliminarProductoPedido(id) { currentPedidoProductos = currentPedidoProductos.filter(p => p.id !== id); actualizarListaPedido(); }

  function crearPedido() {
    const clienteId = document.getElementById('cliente-pedido').value;
    if (!clienteId) { alert('Seleccione un cliente'); return; }
    if (currentPedidoProductos.length === 0) { alert('Agregue productos al pedido'); return; }
    
    const cliente = clientes.find(c => c.id == clienteId);
    const subtotal = currentPedidoProductos.reduce((sum, p) => sum + (p.cantidad * p.precio), 0);
    const iva = subtotal * 0.13;
    const total = subtotal + iva;
    
    const nuevoPedido = {
      id: pedidos.length + 1,
      cliente_id: clienteId,
      cliente_nombre: cliente.nombre,
      productos: [...currentPedidoProductos],
      subtotal: subtotal,
      iva: iva,
      total: total,
      estado: 'pendiente',
      fecha: new Date().toISOString().split('T')[0],
      hora: new Date().toLocaleTimeString(),
      historial_estados: [{ estado: 'pendiente', fecha: new Date().toISOString(), usuario: 'vendedor' }]
    };
    
    pedidos.push(nuevoPedido);
    localStorage.setItem('pedidos', JSON.stringify(pedidos));
    
    // Actualizar stock
    currentPedidoProductos.forEach(p => { const producto = productos.find(prod => prod.id === p.id); if (producto) producto.stock -= p.cantidad; });
    localStorage.setItem('productos', JSON.stringify(productos));
    
    alert('Pedido creado exitosamente');
    currentPedidoProductos = [];
    actualizarListaPedido();
    cargarPedidos();
    cargarSelects();
  }

  function cargarPedidos() {
    const tbody = document.getElementById('tabla-pedidos');
    tbody.innerHTML = pedidos.map(p => {
      let estadoColor = { pendiente: 'bg-yellow-100 text-yellow-600', aprobado: 'bg-blue-100 text-blue-600', despachado: 'bg-purple-100 text-purple-600', entregado: 'bg-green-100 text-green-600', anulado: 'bg-red-100 text-red-600' };
      return `<tr class="border-b"><td class="px-4 py-2">${p.id}</td><td class="px-4 py-2">${p.cliente_nombre}</td><td class="px-4 py-2">Bs. ${p.total.toFixed(2)}</td><td class="px-4 py-2"><span class="px-2 py-1 rounded text-xs ${estadoColor[p.estado]}">${p.estado}</span></td><td class="px-4 py-2">${p.fecha}</td><td class="px-4 py-2"><button onclick="verPedido(${p.id})" class="text-blue-600 mr-2"><i class="fas fa-eye"></i></button><button onclick="cambiarEstado(${p.id})" class="text-green-600"><i class="fas fa-sync-alt"></i></button></td></tr>`;
    }).join('');
  }

  function verPedido(id) { const pedido = pedidos.find(p => p.id === id); alert(JSON.stringify(pedido, null, 2)); }
  function cambiarEstado(id) { const estados = ['pendiente', 'aprobado', 'despachado', 'entregado', 'anulado']; const pedido = pedidos.find(p => p.id === id); const idx = estados.indexOf(pedido.estado); if (idx < estados.length - 1) pedido.estado = estados[idx + 1]; pedido.historial_estados.push({ estado: pedido.estado, fecha: new Date().toISOString(), usuario: 'vendedor' }); localStorage.setItem('pedidos', JSON.stringify(pedidos)); cargarPedidos(); }

  function abrirModalCliente() { window.location.href = 'register.html'; }
  
  cargarSelects();
  cargarPedidos();
</script>
</body>
</html>
